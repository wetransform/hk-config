---
name: Test steps

on:
  pull_request:
    branches:
      - "*"

jobs:
  test-steps:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Run step tests
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # Steps to skip on Windows:
            # - prettier: upstream builtin uses {{tmp}}/ paths that break on Windows
            # - yaml-schema: currently unclear why this fails on Windows
            skip_steps="prettier yaml-schema"

            pattern=$(echo "$skip_steps" | tr ' ' '\n' | sed 's/.*$/^&$/' | paste -sd'|')
            step_args=()
            while IFS= read -r step; do
              [[ -n "$step" ]] && step_args+=(--step "$step")
            done < <(hk test --list | awk -F ' :: ' 'NF==2{print $1}' | sort -u | grep -Ev "$pattern")
            hk test -v "${step_args[@]}"
          else
            hk test
          fi
