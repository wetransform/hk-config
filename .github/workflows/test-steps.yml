---
name: Test steps

on:
  pull_request:
    branches:
      - "*"

jobs:
  test-steps:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          github_token: ${{ secrets.GH_PAT_READ_WETRANSFORM }}

      - name: Run step tests
        shell: bash
        run: |
          cp hk.pkl hk.pkl.bak
          cp hk-test-all.pkl hk.pkl
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # Steps to skip on Windows:
            # - prettier: upstream builtin uses {{tmp}}/ paths that break on Windows
            # - yaml-schema: currently unclear why this fails on Windows
            # - ripsecrets: no Windows binary available
            skip_steps="prettier yaml-schema ripsecrets"

            pattern=$(echo "$skip_steps" | tr ' ' '\n' | sed 's/.*$/^&$/' | paste -sd'|')
            step_args=()
            while IFS= read -r step; do
              [[ -n "$step" ]] && step_args+=(--step "$step")
            done < <(hk test --list | awk -F ' :: ' 'NF==2{print $1}' | sort -u | grep -Ev "$pattern")
            hk test -v "${step_args[@]}"
          else
            hk test
          fi
          mv hk.pkl.bak hk.pkl

  test-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run step tests in minimal Docker environment
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_READ_WETRANSFORM }}
        run: ./test-docker.sh
